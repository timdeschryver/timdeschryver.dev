name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: 🚀 Build and Deploy
    outputs:
      swa_url: ${{ steps.swa.outputs.static_web_app_url }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🛠️ Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.node-version'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: ⏳ Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧱 Build
        run: pnpm run build
        env:
          VITE_PUBLIC_HASH: ${{ github.sha }}
          VITE_PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}

      - name: 🧪 Unit Test
        run: pnpm test:unit

      # - name: 🎭 Install Playwright
      #   run: npx playwright install --with-deps

      # - name: 🧑‍🤝‍🧑 Fetching Contributors
      #   run: npm run contributors

      - name: 🚀 Build And Deploy
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_ROCK_0FB035B03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          skip_app_build: true
          app_location: 'build'
          skip_api_build: true
          production_branch: 'main'
        env:
          VITE_PUBLIC_HASH: ${{ github.sha }}
          VITE_PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}

  smoke_test_job:
    name: ☁️ Smoke test
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3

      - name: OIDC Login to Azure Public Cloud
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: 🛠️ Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.node-version'

      - name: � Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🔎 Install dependencies
        run: pnpm install --frozen-lockfile

      # Not needed because of Playwright Service
      # - name: 🎭 Install Playwright
      #   run: npx playwright install --with-deps

      - name: 🧪 Run Playwright Tests on ${{ needs.build_and_deploy.outputs.swa_url }}
        run: pnpm exec playwright test --config=playwright.service.config.ts
        env:
          PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
          PLAYWRIGHT_SERVICE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.build_and_deploy.outputs.swa_url }}

      - name: 📦 Upload Test Results Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: playwright-report

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: 📕 Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_ROCK_0FB035B03 }}
          action: 'close'
